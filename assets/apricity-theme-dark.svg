<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" width="760" height="250" role="img" aria-label="Apricity theme switcher: an Auto / Light / Dark segmented control cycles while a miniature interface morphs between light and dark">
  <title>Apricity — make it yours: theme switcher (dark)</title>
  <defs>
    <style>
      .seglbl{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;font-size:13px;font-weight:600}
    </style>
  </defs>

  <!-- ============ MINI INTERFACE (morphs light <-> dark) ============ -->
  <rect x="40" y="30" width="680" height="150" rx="18" fill="#f5f5f7" stroke="#e6e6e9" stroke-width="1">
    <animate attributeName="fill" dur="12s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.28;0.36;0.62;0.70;0.95;1" values="#f5f5f7;#f5f5f7;#000000;#000000;#0a0a0c;#f5f5f7;#f5f5f7"
      keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    <animate attributeName="stroke" dur="12s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.28;0.36;0.70;0.95;1" values="#e6e6e9;#e6e6e9;#2c2c2e;#2c2c2e;#e6e6e9;#e6e6e9"
      keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </rect>

  <circle cx="66" cy="56" r="9" fill="#3f94ba"/>
  <rect x="86" y="48" width="300" height="16" rx="8" fill="#ffffff" stroke="#e6e6e9" stroke-width="1">
    <animate attributeName="fill" dur="12s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.28;0.36;0.70;0.95;1" values="#ffffff;#ffffff;#1c1c1e;#1c1c1e;#ffffff;#ffffff"
      keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    <animate attributeName="stroke" dur="12s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.28;0.36;0.70;0.95;1" values="#e6e6e9;#e6e6e9;#38383b;#38383b;#e6e6e9;#e6e6e9"
      keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </rect>
  <circle cx="694" cy="56" r="13" fill="none" stroke="#d2d2d7" stroke-width="1">
    <animate attributeName="stroke" dur="12s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.28;0.36;0.70;0.95;1" values="#d2d2d7;#d2d2d7;#48484b;#48484b;#d2d2d7;#d2d2d7"
      keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </circle>
  <g transform="translate(688,50) scale(0.5)" fill="none" stroke="#b07d00" stroke-width="1.8" stroke-linecap="round">
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.28;0.34;0.40;1" values="1;1;0;0;1" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>
    <circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8"/>
  </g>
  <g transform="translate(688,50) scale(0.5)" fill="none" stroke="#a1a1a6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.30;0.36;0.66;0.72;1" values="0;0;1;1;0;0" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0 0 1 1"/>
    <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>
  </g>

  <rect x="66" y="84" width="628" height="76" rx="13" fill="#ffffff" stroke="#ececef" stroke-width="1">
    <animate attributeName="fill" dur="12s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.28;0.36;0.70;0.95;1" values="#ffffff;#ffffff;#1c1c1e;#1c1c1e;#ffffff;#ffffff"
      keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    <animate attributeName="stroke" dur="12s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.28;0.36;0.70;0.95;1" values="#ececef;#ececef;#38383b;#38383b;#ececef;#ececef"
      keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </rect>
  <rect x="82" y="98" width="4" height="48" rx="2" fill="#3f94ba"/>
  <rect x="100" y="100" width="150" height="11" rx="5.5">
    <animate attributeName="fill" dur="12s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.28;0.36;0.70;0.95;1" values="#1d1d1f;#1d1d1f;#f5f5f7;#f5f5f7;#1d1d1f;#1d1d1f"
      keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </rect>
  <rect x="100" y="122" width="430" height="8" rx="4">
    <animate attributeName="fill" dur="12s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.28;0.36;0.70;0.95;1" values="#d7d7db;#d7d7db;#48484b;#48484b;#d7d7db;#d7d7db"
      keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </rect>
  <rect x="100" y="136" width="360" height="8" rx="4">
    <animate attributeName="fill" dur="12s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.28;0.36;0.70;0.95;1" values="#d7d7db;#d7d7db;#48484b;#48484b;#d7d7db;#d7d7db"
      keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </rect>

  <!-- ============ SEGMENTED CONTROL ============ -->
  <rect x="280" y="204" width="200" height="34" rx="17" fill="#2c2c2e"/>
  <rect y="208" width="60" height="26" rx="13" fill="#48484b" stroke="#5a5a5e" stroke-width="1">
    <animate attributeName="x" dur="12s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.06;0.30;0.36;0.64;0.70;0.94;1"
      values="350;350;350;350;416;416;284;284"
      keySplines="0 0 1 1;0.34 1.3 0.64 1;0 0 1 1;0.34 1.3 0.64 1;0 0 1 1;0.34 1.3 0.64 1;0 0 1 1"/>
  </rect>
  <text x="314" y="225" text-anchor="middle" class="seglbl" fill="#8e8e93">Auto</text>
  <text x="380" y="225" text-anchor="middle" class="seglbl" fill="#f5f5f7">Light</text>
  <text x="446" y="225" text-anchor="middle" class="seglbl" fill="#8e8e93">Dark</text>
</svg>
