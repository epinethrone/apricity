<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" width="760" height="250" role="img" aria-label="Apricity theme switcher: the Auto / Light / Dark selection tracks a miniature interface as it morphs between dark and light">
  <title>Apricity — make it yours: theme switcher (dark)</title>
  <defs>
    <style>.seglbl{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;font-size:13px;font-weight:600}</style>
  </defs>

  <!-- ============ MINI INTERFACE — dark -> light -> dark ============ -->
  <rect x="40" y="30" width="680" height="150" rx="18" fill="#000000" stroke="#2c2c2e" stroke-width="1">
    <animate attributeName="fill"   dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#000000;#000000;#f5f5f7;#f5f5f7;#000000;#000000"/>
    <animate attributeName="stroke" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#2c2c2e;#2c2c2e;#e6e6e9;#e6e6e9;#2c2c2e;#2c2c2e"/>
  </rect>

  <circle cx="66" cy="56" r="9" fill="#3f94ba"/>
  <rect x="86" y="48" width="300" height="16" rx="8" fill="#1c1c1e" stroke="#38383b" stroke-width="1">
    <animate attributeName="fill"   dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#1c1c1e;#1c1c1e;#ffffff;#ffffff;#1c1c1e;#1c1c1e"/>
    <animate attributeName="stroke" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#38383b;#38383b;#e6e6e9;#e6e6e9;#38383b;#38383b"/>
  </rect>
  <circle cx="694" cy="56" r="13" fill="none" stroke="#48484b" stroke-width="1">
    <animate attributeName="stroke" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#48484b;#48484b;#d2d2d7;#d2d2d7;#48484b;#48484b"/>
  </circle>
  <!-- moon (dark phases) -->
  <g transform="translate(688,50) scale(0.5)" fill="none" stroke="#a1a1a6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="1;1;0;0;1;1"/>
    <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>
  </g>
  <!-- sun (light phase) — same grey as the moon -->
  <g transform="translate(688,50) scale(0.5)" fill="none" stroke="#a1a1a6" stroke-width="1.8" stroke-linecap="round">
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="0;0;1;1;0;0"/>
    <circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8"/>
  </g>

  <rect x="66" y="84" width="628" height="76" rx="13" fill="#1c1c1e" stroke="#38383b" stroke-width="1">
    <animate attributeName="fill"   dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#1c1c1e;#1c1c1e;#ffffff;#ffffff;#1c1c1e;#1c1c1e"/>
    <animate attributeName="stroke" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#38383b;#38383b;#ececef;#ececef;#38383b;#38383b"/>
  </rect>
  <rect x="82" y="98" width="4" height="48" rx="2" fill="#3f94ba"/>
  <rect x="100" y="100" width="150" height="11" rx="5.5" fill="#f5f5f7">
    <animate attributeName="fill" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#f5f5f7;#f5f5f7;#1d1d1f;#1d1d1f;#f5f5f7;#f5f5f7"/>
  </rect>
  <rect x="100" y="122" width="430" height="8" rx="4" fill="#48484b">
    <animate attributeName="fill" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#48484b;#48484b;#d7d7db;#d7d7db;#48484b;#48484b"/>
  </rect>
  <rect x="100" y="136" width="360" height="8" rx="4" fill="#48484b">
    <animate attributeName="fill" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#48484b;#48484b;#d7d7db;#d7d7db;#48484b;#48484b"/>
  </rect>

  <!-- ============ SEGMENTED CONTROL — selection tracks the interface theme ============ -->
  <rect x="280" y="204" width="200" height="34" rx="17" fill="#2c2c2e">
    <animate attributeName="fill" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#2c2c2e;#2c2c2e;#e9e9ec;#e9e9ec;#2c2c2e;#2c2c2e"/>
  </rect>
  <!-- thumb: under Dark during dark phase (x=416), slides to Light (x=350) during light phase -->
  <rect x="416" y="208" width="60" height="26" rx="13" fill="#48484b" stroke="#5a5a5e" stroke-width="1">
    <animate attributeName="x"      dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="416;416;350;350;416;416"/>
    <animate attributeName="fill"   dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#48484b;#48484b;#ffffff;#ffffff;#48484b;#48484b"/>
    <animate attributeName="stroke" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#5a5a5e;#5a5a5e;#dcdce0;#dcdce0;#5a5a5e;#5a5a5e"/>
  </rect>
  <g class="seglbl" text-anchor="middle" fill="#f5f5f7">
    <animate attributeName="fill" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="#f5f5f7;#f5f5f7;#1d1d1f;#1d1d1f;#f5f5f7;#f5f5f7"/>
    <text x="314" y="225" opacity="0.5">Auto</text>
    <text x="380" y="225" opacity="0.5">Light<animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="0.5;0.5;1;1;0.5;0.5"/></text>
    <text x="446" y="225" opacity="1">Dark<animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.32;0.36;0.68;0.72;1" values="1;1;0.5;0.5;1;1"/></text>
  </g>
</svg>
