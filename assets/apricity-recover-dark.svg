<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="760" height="200" role="img" aria-label="Apricity curate and recover: a memory card slides from Memories into Recently deleted, gains a Restore button, then slides back">
  <title>Apricity — delete is snapshotted and recoverable (dark)</title>
  <defs>
    <style>
      .title{fill:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;font-weight:600}
      .kick{fill:#8e8e93;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:0.05em}
      .prev{fill:#6e6e73;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}
      .lbl{fill:#a1a1a6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.06em}
      .restore{fill:#7cc1de;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12.5px;font-weight:600}
      .recov{fill:#fe5f63;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.04em}
    </style>
    <filter id="shd" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- eyebrow labels -->
  <text x="202" y="26" text-anchor="middle" class="lbl">MEMORIES</text>
  <text x="558" y="26" text-anchor="middle" class="lbl">RECENTLY DELETED</text>

  <!-- matched container outlines -->
  <rect x="52"  y="40" width="300" height="122" rx="16" fill="#161618" stroke="#38383b" stroke-width="1"/>
  <rect x="408" y="40" width="300" height="122" rx="16" fill="#161618" stroke="#38383b" stroke-width="1"/>

  <!-- empty-slot dashed hint in whichever box the card is NOT in -->
  <rect x="64"  y="52" width="276" height="98" rx="11" fill="none" stroke="#3a3a3d" stroke-width="1.5" stroke-dasharray="5 6" opacity="0">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.26;0.34;0.66;0.74;1" values="0;0;0.9;0.9;0;0"
      keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0 0 1 1"/>
  </rect>
  <rect x="420" y="52" width="276" height="98" rx="11" fill="none" stroke="#3a3a3d" stroke-width="1.5" stroke-dasharray="5 6" opacity="0.9">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.18;0.26;0.74;0.82;1" values="0.9;0.9;0;0;0.9;0.9"
      keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0 0 1 1"/>
  </rect>

  <!-- ===== THE CARD — one element that slides left -> right -> left ===== -->
  <g filter="url(#shd)">
    <animateTransform attributeName="transform" type="translate" dur="9s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.18;0.34;0.66;0.82;1" values="0 0;0 0;356 0;356 0;0 0;0 0"
      keySplines="0 0 1 1;0.42 0 0.2 1;0 0 1 1;0.42 0 0.2 1;0 0 1 1"/>

    <rect x="52" y="40" width="300" height="122" rx="16" fill="#1c1c1e" stroke="#38383b" stroke-width="1"/>
    <rect x="64" y="56" width="4" height="90" rx="2" fill="#3f94ba">
      <animate attributeName="fill" dur="9s" repeatCount="indefinite" calcMode="discrete"
        keyTimes="0;0.18;0.82" values="#3f94ba;#fe5f63;#3f94ba"/>
    </rect>
    <rect x="52" y="40" width="300" height="122" rx="16" fill="#fe5f63" opacity="0">
      <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="spline"
        keyTimes="0;0.16;0.23;0.30;1" values="0;0;0.26;0;0"
        keySplines="0 0 1 1;0.4 0 0.6 1;0.4 0 1 1;0 0 1 1"/>
    </rect>

    <text x="78" y="68" class="kick">NOTES · GENERAL</text>
    <text x="78" y="92" class="title">Pi swap-file tuning</text>
    <text x="78" y="114" class="prev">8GB swap on NVMe, swappiness=80,</text>
    <text x="78" y="133" class="prev">vfs_cache_pressure=200.</text>

    <g opacity="0">
      <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="spline"
        keyTimes="0;0.30;0.40;0.62;0.70;1" values="0;0;1;1;0;0"
        keySplines="0 0 1 1;0.34 1.45 0.64 1;0 0 1 1;0.4 0 0.6 1;0 0 1 1"/>
      <rect x="246" y="122" width="86" height="28" rx="14" fill="rgba(63,148,186,0.18)" stroke="rgba(63,148,186,0.5)" stroke-width="1"/>
      <text x="289" y="140" text-anchor="middle" class="restore">↺ Restore</text>
      <circle cx="289" cy="136" r="8" fill="none" stroke="#7cc1de" stroke-width="2">
        <animate attributeName="r" dur="9s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.56;0.64;1" values="8;8;26;26" keySplines="0 0 1 1;0.2 0 0.4 1;0 0 1 1"/>
        <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.56;0.62;0.66;1" values="0;0.85;0.85;0;0"/>
      </circle>
    </g>
  </g>
</svg>
