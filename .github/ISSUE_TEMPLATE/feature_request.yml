name: Feature request
description: Suggest a capability or workflow improvement.
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Before filling this in, please skim the existing issues — this is a small project and we try to keep the surface area tight.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the dashboard makes harder than it should be?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How could the dashboard help? Sketch the UI, API shape, or behaviour you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or rejected, and why.
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Fit with project values
      description: This project stays small and dependency-free on purpose. Please confirm your proposal respects that.
      options:
        - label: Does not require adding a Python or JavaScript dependency.
        - label: Does not require a build step or package manager.
        - label: Does not add network calls outside `127.0.0.1`.
