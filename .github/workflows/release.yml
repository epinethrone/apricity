name: release

on:
  push:
    tags:
      - "v*"
  # Manual trigger from the Actions UI — useful for re-running the
  # release flow against an already-published tag without force-pushing.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to (re)release. Leave blank to use the current ref."
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify the version in pyproject.toml matches the git tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg_version=$(python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "tag=$tag pyproject=$pkg_version"
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::tag $tag does not match pyproject.toml version $pkg_version" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
          # Re-runs and re-tags shouldn't pile up duplicate "Full
          # Changelog" lines on the existing release body.
          append_body: false

  pypi-publish:
    name: Publish to PyPI (trusted publisher)
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mempalace-dashboard
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Re-running the workflow on an existing tag (e.g. after a
          # force-push) shouldn't fail — PyPI rejects duplicate uploads,
          # which would otherwise show up as a red deployment.
          skip-existing: true
